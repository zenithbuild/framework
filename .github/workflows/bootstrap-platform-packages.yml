name: Bootstrap Platform Packages

on:
  workflow_dispatch:
    inputs:
      train_version:
        description: Optional train version override. Uses TRAIN_VERSION when empty.
        required: false
        type: string
      packages:
        description: Comma-separated platform package names to bootstrap (bundler-* and compiler-*).
        required: false
        default: bundler-darwin-arm64,bundler-darwin-x64,bundler-linux-x64,bundler-win32-x64,compiler-darwin-arm64,compiler-darwin-x64,compiler-linux-x64,compiler-win32-x64
        type: string

permissions:
  contents: read

jobs:
  bootstrap-platform-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            package_kind: bundler
            package_name: bundler-darwin-arm64
            package_dir: packages/bundler-darwin-arm64
            rust_target: aarch64-apple-darwin
            platform_key: darwin-arm64
          - runner: macos-15-intel
            package_kind: bundler
            package_name: bundler-darwin-x64
            package_dir: packages/bundler-darwin-x64
            rust_target: x86_64-apple-darwin
            platform_key: darwin-x64
          - runner: ubuntu-latest
            package_kind: bundler
            package_name: bundler-linux-x64
            package_dir: packages/bundler-linux-x64
            rust_target: x86_64-unknown-linux-gnu
            platform_key: linux-x64
          - runner: windows-latest
            package_kind: bundler
            package_name: bundler-win32-x64
            package_dir: packages/bundler-win32-x64
            rust_target: x86_64-pc-windows-msvc
            platform_key: win32-x64
          - runner: macos-14
            package_kind: compiler
            package_name: compiler-darwin-arm64
            package_dir: packages/compiler-darwin-arm64
            rust_target: aarch64-apple-darwin
            platform_key: darwin-arm64
          - runner: macos-15-intel
            package_kind: compiler
            package_name: compiler-darwin-x64
            package_dir: packages/compiler-darwin-x64
            rust_target: x86_64-apple-darwin
            platform_key: darwin-x64
          - runner: ubuntu-latest
            package_kind: compiler
            package_name: compiler-linux-x64
            package_dir: packages/compiler-linux-x64
            rust_target: x86_64-unknown-linux-gnu
            platform_key: linux-x64
          - runner: windows-latest
            package_kind: compiler
            package_name: compiler-win32-x64
            package_dir: packages/compiler-win32-x64
            rust_target: x86_64-pc-windows-msvc
            platform_key: win32-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve bootstrap target
        id: target
        shell: bash
        env:
          INPUT_TRAIN_VERSION: ${{ inputs.train_version }}
          INPUT_PACKAGES: ${{ inputs.packages }}
          MATRIX_PACKAGE: ${{ matrix.package_name }}
        run: |
          set -euo pipefail

          train_version="${INPUT_TRAIN_VERSION}"
          if [[ -z "$train_version" ]]; then
            train_version="$(tr -d '[:space:]' < TRAIN_VERSION)"
          fi

          selected=false
          IFS=',' read -r -a packages <<<"${INPUT_PACKAGES// /}"
          for package in "${packages[@]}"; do
            if [[ "$package" == "$MATRIX_PACKAGE" ]]; then
              selected=true
              break
            fi
          done

          echo "train_version=${train_version}" >> "$GITHUB_OUTPUT"
          echo "selected=${selected}" >> "$GITHUB_OUTPUT"

      - name: Configure npm bootstrap auth
        if: steps.target.outputs.selected == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Missing required secret: NPM_BOOTSTRAP_TOKEN" >&2
            exit 1
          fi
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$HOME/.npmrc"

      - name: Build native binary for target platform package
        if: steps.target.outputs.selected == 'true'
        shell: bash
        env:
          PACKAGE_KIND: ${{ matrix.package_kind }}
          PLATFORM_KEY: ${{ matrix.platform_key }}
          TARGET_TRIPLE: ${{ matrix.rust_target }}
          ZENITH_TRAIN_VERSION: ${{ steps.target.outputs.train_version }}
        run: |
          set -euo pipefail
          rustup target add "${TARGET_TRIPLE}"

          if [[ "${PACKAGE_KIND}" == "bundler" ]]; then
            cargo build --release --target "${TARGET_TRIPLE}" --manifest-path packages/bundler/Cargo.toml
            BUNDLER_PLATFORM_KEY="${PLATFORM_KEY}" \
            BUNDLER_TARGET_TRIPLE="${TARGET_TRIPLE}" \
            node scripts/stage-bundler-platform-package.mjs
          else
            cargo build --release --target "${TARGET_TRIPLE}" --manifest-path packages/compiler/Cargo.toml -p zenith_cli
            COMPILER_PLATFORM_KEY="${PLATFORM_KEY}" \
            COMPILER_TARGET_TRIPLE="${TARGET_TRIPLE}" \
            node scripts/stage-compiler-platform-package.mjs
          fi

      - name: Bootstrap platform package
        if: steps.target.outputs.selected == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/bootstrap-platform-package.mjs \
            "${{ matrix.package_dir }}" \
            "@zenithbuild/${{ matrix.package_name }}" \
            "${{ steps.target.outputs.train_version }}" \
            "https://registry.npmjs.org/"

      - name: Skip unselected package
        if: steps.target.outputs.selected != 'true'
        shell: bash
        run: echo "skipped @zenithbuild/${{ matrix.package_name }} (not requested)"
