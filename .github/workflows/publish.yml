# Preconditions for npm Trusted Publishing:
# - Configure each published package for GitHub Actions trusted publishing on npm.
# - npm publisher settings must use:
#   - org: zenithbuild
#   - repo: framework
#   - workflow file: publish.yml
#   - environment: npm-release
# - This repository must remain public so npm provenance stays available for publishes.

name: Publish (npm)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve Playwright version
        id: playwright_version
        run: |
          version="$(node -p "const pkg = require('./apps/smoke-test/package.json'); pkg.devDependencies?.playwright ?? pkg.dependencies?.playwright ?? pkg.devDependencies?.['@playwright/test'] ?? pkg.dependencies?.['@playwright/test'] ?? ''")"
          if [[ -z "$version" ]]; then
            echo "Unable to determine Playwright version from apps/smoke-test/package.json" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/**/Cargo.lock', 'packages/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: bun install

      - run: bunx playwright install --with-deps chromium

      - name: Run CI (retry once)
        shell: bash
        run: |
          set -euo pipefail
          if bun run ci; then
            exit 0
          fi

          echo "CI failed on first attempt; retrying once..."
          bun run ci

  preflight:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      train_version: ${{ steps.train_version.outputs.train_version }}
      train_tag: ${{ steps.train_version.outputs.train_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Assert tag matches TRAIN_VERSION
        id: train_version
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          train_version="$(tr -d '[:space:]' < TRAIN_VERSION)"
          tag_version="${TAG_NAME#v}"

          if [[ "$TAG_NAME" != v* ]]; then
            echo "Expected a v-prefixed release tag, found ${TAG_NAME}." >&2
            exit 1
          fi

          if [[ "$train_version" != "$tag_version" ]]; then
            echo "TRAIN_VERSION=${train_version} but tag=${TAG_NAME}; bump TRAIN_VERSION first or retag correctly." >&2
            exit 1
          fi

          echo "train_version=${train_version}" >> "$GITHUB_OUTPUT"
          echo "train_tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Assert tag is on train
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/assert-tag-on-branch.mjs train

      - name: Verify platform package names are bootstrapped
        shell: bash
        run: |
          set -euo pipefail
          registry="https://registry.npmjs.org/"
          packages=(
            "@zenithbuild/bundler-darwin-arm64"
            "@zenithbuild/bundler-darwin-x64"
            "@zenithbuild/bundler-linux-x64"
            "@zenithbuild/bundler-win32-x64"
            "@zenithbuild/compiler-darwin-arm64"
            "@zenithbuild/compiler-darwin-x64"
            "@zenithbuild/compiler-linux-x64"
            "@zenithbuild/compiler-win32-x64"
          )

          missing=()
          for package in "${packages[@]}"; do
            if ! npm view "${package}" version --json --loglevel=error --registry "${registry}" >/dev/null 2>&1; then
              missing+=("${package}")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            joined="$(IFS=, ; echo "${missing[*]}")"
            echo "Platform package names are not bootstrapped on npm: ${joined}" >&2
            echo "Run the manual Bootstrap Platform Packages workflow once for missing names using NPM_BOOTSTRAP_TOKEN, then re-run publish." >&2
            exit 1
          fi

  publish_platforms:
    name: Platform Bootstrap
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            package_kind: bundler
            package_dir: packages/bundler-darwin-arm64
            rust_target: aarch64-apple-darwin
            platform_key: darwin-arm64
          - runner: macos-15-intel
            package_kind: bundler
            package_dir: packages/bundler-darwin-x64
            rust_target: x86_64-apple-darwin
            platform_key: darwin-x64
          - runner: ubuntu-latest
            package_kind: bundler
            package_dir: packages/bundler-linux-x64
            rust_target: x86_64-unknown-linux-gnu
            platform_key: linux-x64
          - runner: windows-latest
            package_kind: bundler
            package_dir: packages/bundler-win32-x64
            rust_target: x86_64-pc-windows-msvc
            platform_key: win32-x64
          - runner: macos-14
            package_kind: compiler
            package_dir: packages/compiler-darwin-arm64
            rust_target: aarch64-apple-darwin
            platform_key: darwin-arm64
          - runner: macos-15-intel
            package_kind: compiler
            package_dir: packages/compiler-darwin-x64
            rust_target: x86_64-apple-darwin
            platform_key: darwin-x64
          - runner: ubuntu-latest
            package_kind: compiler
            package_dir: packages/compiler-linux-x64
            rust_target: x86_64-unknown-linux-gnu
            platform_key: linux-x64
          - runner: windows-latest
            package_kind: compiler
            package_dir: packages/compiler-win32-x64
            rust_target: x86_64-pc-windows-msvc
            platform_key: win32-x64
    runs-on: ${{ matrix.runner }}
    environment: npm-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Assert OIDC-only publish auth
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NPM_TOKEN:-}" || -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Token-based npm auth is disabled in Publish (npm). Use npm Trusted Publishing (OIDC)." >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve train version
        shell: bash
        run: |
          set -euo pipefail
          echo "ZENITH_TRAIN_VERSION=$(tr -d '[:space:]' < TRAIN_VERSION)" >> "$GITHUB_ENV"

      - name: Build native binary for current platform package
        shell: bash
        env:
          PACKAGE_KIND: ${{ matrix.package_kind }}
          PLATFORM_KEY: ${{ matrix.platform_key }}
          TARGET_TRIPLE: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          rustup target add "${TARGET_TRIPLE}"

          if [[ "${PACKAGE_KIND}" == "bundler" ]]; then
            cargo build --release --target "${TARGET_TRIPLE}" --manifest-path packages/bundler/Cargo.toml
            BUNDLER_PLATFORM_KEY="${PLATFORM_KEY}" \
            BUNDLER_TARGET_TRIPLE="${TARGET_TRIPLE}" \
            node scripts/stage-bundler-platform-package.mjs
          else
            cargo build --release --target "${TARGET_TRIPLE}" --manifest-path packages/compiler/Cargo.toml -p zenith_cli
            COMPILER_PLATFORM_KEY="${PLATFORM_KEY}" \
            COMPILER_TARGET_TRIPLE="${TARGET_TRIPLE}" \
            node scripts/stage-compiler-platform-package.mjs
          fi

      - name: Publish platform package
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NPM_CONFIG_TAG: train
          PUBLISH_FALLBACK_TAG: train
          PUBLISH_PACKAGE_FILTER: ${{ matrix.package_dir }}
        run: ./scripts/publish-train.sh

  platform_stage:
    name: Platform Stage Complete
    needs: [preflight, publish_platforms]
    if: always() && needs.preflight.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Validate platform stage status
        shell: bash
        env:
          PLATFORM_RESULT: ${{ needs.publish_platforms.result }}
        run: |
          set -euo pipefail
          if [[ "${PLATFORM_RESULT}" != "success" ]]; then
            echo "Platform Bootstrap must succeed before publish jobs can run." >&2
            exit 1
          fi

          echo "Platform Bootstrap completed successfully."

  publish_train:
    needs: [preflight, platform_stage]
    if: needs.platform_stage.result == 'success'
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Assert OIDC-only publish auth
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NPM_TOKEN:-}" || -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Token-based npm auth is disabled in Publish (npm). Use npm Trusted Publishing (OIDC)." >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/**/Cargo.lock', 'packages/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: bun install

      - name: Build compiler and bundler meta packages
        shell: bash
        run: |
          set -euo pipefail
          export ZENITH_TRAIN_VERSION="$(tr -d '[:space:]' < TRAIN_VERSION)"
          cargo build --release --manifest-path packages/compiler/Cargo.toml
          bun run --cwd packages/compiler build
          bun run --cwd packages/bundler build

      - name: Publish train packages
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NPM_CONFIG_TAG: train
          PUBLISH_FALLBACK_TAG: train
          PUBLISH_PACKAGE_FILTER: packages/bundler,packages/compiler,packages/runtime,packages/router,packages/core,packages/cli,packages/language-server,packages/language
        run: ./scripts/publish-train.sh

  release_metadata:
    needs: [preflight, publish_train]
    if: needs.publish_train.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Write release metadata artifact
        shell: bash
        env:
          TRAIN_VERSION: ${{ needs.preflight.outputs.train_version }}
          TRAIN_TAG: ${{ needs.preflight.outputs.train_tag }}
          TRAIN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cat > framework-release.json <<JSON
          {
            "version": "${TRAIN_VERSION}",
            "tag": "${TRAIN_TAG}",
            "sha": "${TRAIN_SHA}"
          }
          JSON

      - uses: actions/upload-artifact@v4
        with:
          name: framework-release-metadata
          path: framework-release.json
          if-no-files-found: error
