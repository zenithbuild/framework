name: reusable-ci

on:
  workflow_call:

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve Playwright version
        id: playwright_version
        run: |
          version="$(node -p "const pkg = require('./apps/smoke-test/package.json'); pkg.devDependencies?.playwright ?? pkg.dependencies?.playwright ?? pkg.devDependencies?.['@playwright/test'] ?? pkg.dependencies?.['@playwright/test'] ?? ''")"
          if [[ -z "$version" ]]; then
            echo "Unable to determine Playwright version from apps/smoke-test/package.json" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/**/Cargo.lock', 'packages/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: bun install

      - name: File-Size Audit (Stage 1 report-only)
        continue-on-error: true
        run: node ./scripts/file-size-audit.mjs --allowlist docs/maintainability/file-size-allowlist.json --print-limit 200

      - name: File-Size Audit (Bundler >800 blocking)
        run: node ./scripts/file-size-audit.mjs --allowlist docs/maintainability/file-size-allowlist.json --enforce --max-lines 800 --include-path-prefix packages/bundler/src --print-limit 200

      - name: Fetch Main for touched-file audit
        run: git fetch --no-tags --prune origin +refs/heads/${{ github.event.repository.default_branch }}:refs/remotes/origin/${{ github.event.repository.default_branch }}

      - name: File-Size Audit (Touched files >500 blocking)
        run: node ./scripts/file-size-audit.mjs --allowlist docs/maintainability/file-size-allowlist.json --enforce --max-lines 500 --git-diff-base origin/${{ github.event.repository.default_branch }} --print-limit 200

      - run: bun run --cwd apps/smoke-test playwright install --with-deps chromium

      - name: Run Core CI (retry once)
        shell: bash
        run: |
          set -euo pipefail
          if bash ./scripts/ci-core.sh; then
            exit 0
          fi

          echo "Core CI failed on first attempt; retrying once..."
          bash ./scripts/ci-core.sh

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve Playwright version
        id: playwright_version
        run: |
          version="$(node -p "const pkg = require('./apps/smoke-test/package.json'); pkg.devDependencies?.playwright ?? pkg.dependencies?.playwright ?? pkg.devDependencies?.['@playwright/test'] ?? pkg.dependencies?.['@playwright/test'] ?? ''")"
          if [[ -z "$version" ]]; then
            echo "Unable to determine Playwright version from apps/smoke-test/package.json" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/**/Cargo.lock', 'packages/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: bun install

      - run: bun run --cwd apps/smoke-test playwright install --with-deps chromium

      - name: Run Integration Shard ${{ matrix.shard_index }}/6 (retry once)
        shell: bash
        env:
          ZENITH_CI_HEARTBEAT_SECONDS: 30
          ZENITH_CI_PREPARE: 1
          ZENITH_CI_SHARD_INDEX: ${{ matrix.shard_index }}
          ZENITH_CI_SHARD_TOTAL: 6
        run: |
          set -euo pipefail
          timestamp() {
            date -u +"%Y-%m-%dT%H:%M:%SZ"
          }

          log_retry() {
            printf '[integration-retry][%s] shard=%s/%s attempt=%s event=%s exit=%s\n' \
              "$(timestamp)" \
              "${ZENITH_CI_SHARD_INDEX}" \
              "${ZENITH_CI_SHARD_TOTAL}" \
              "$1" \
              "$2" \
              "${3:-n/a}"
          }

          log_retry 1 start
          if ZENITH_CI_RETRY_ATTEMPT=1 bash ./scripts/ci-integration.sh; then
            log_retry 1 end 0
            exit 0
          fi
          retry_exit=$?
          log_retry 1 end "$retry_exit"

          echo "Integration shard failed on first attempt; retrying once..."
          log_retry 2 start
          if ZENITH_CI_RETRY_ATTEMPT=2 bash ./scripts/ci-integration.sh; then
            log_retry 2 end 0
            exit 0
          fi

          retry_exit=$?
          log_retry 2 end "$retry_exit"
          exit "$retry_exit"

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve Playwright version
        id: playwright_version
        run: |
          version="$(node -p "const pkg = require('./apps/smoke-test/package.json'); pkg.devDependencies?.playwright ?? pkg.dependencies?.playwright ?? pkg.devDependencies?.['@playwright/test'] ?? pkg.dependencies?.['@playwright/test'] ?? ''")"
          if [[ -z "$version" ]]; then
            echo "Unable to determine Playwright version from apps/smoke-test/package.json" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/**/Cargo.lock', 'packages/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: bun install

      - run: bun run --cwd apps/smoke-test playwright install --with-deps chromium

      - name: Run Smoke CI (retry once)
        shell: bash
        run: |
          set -euo pipefail
          if bash ./scripts/ci-smoke.sh; then
            exit 0
          fi

          echo "Smoke CI failed on first attempt; retrying once..."
          bash ./scripts/ci-smoke.sh
